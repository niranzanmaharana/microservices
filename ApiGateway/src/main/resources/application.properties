server.port=8082
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8010/eureka

#Enable the location to call end points using the service name like user-ws/user/status/check..
#spring.cloud.gateway.discovery.locator.enabled=true

#For case sensitive service name like user-ws(true) or USER-WS(false)
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=users-status-check
spring.cloud.gateway.routes[0].uri=lb://user-ws
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/status/check
spring.cloud.gateway.routes[0].predicates[1]=Method=GET
spring.cloud.gateway.routes[0].filters[0]=RemoveRequestHeader=Cookie
